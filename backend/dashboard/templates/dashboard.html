<!DOCTYPE html>
<html>
<head>
    <title>SmartClass Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #1a1a2e; color: white; }
        .container { max-width: 1200px; margin: 0 auto; }
        canvas { background: #16213e; border-radius: 10px; }
        .status { font-size: 24px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 SmartClass Live Control Dashboard</h1>
        <div class="status" id="status">Connecting...</div>
        <canvas id="sensorChart" width="1200" height="400"></canvas>
        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <div id="current-data" style="background: #0f3460; padding: 20px; border-radius: 10px;">
                <h3>Live Readings</h3>
                <p>Temperature: <span id="temp">--°C</span></p>
                <p>Pressure: <span id="pressure">-- bar</span></p>
                <p>Humidity: <span id="humidity">--%</span></p>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Temperature (°C)', data: [], borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', tension: 0.4, fill: true },
                    { label: 'Pressure (bar)', data: [], borderColor: '#4ecdc4', backgroundColor: 'rgba(78,205,196,0.1)', tension: 0.4, fill: true, yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { position: 'left', title: { display: true, text: 'Temperature (°C)' } },
                    y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Pressure (bar)' } }
                },
                animation: false
            }
        });

        const eventSource = new EventSource('/live/');
        eventSource.onopen = () => {
            document.getElementById('status').innerHTML = '🟢 LIVE - Connected';
            document.getElementById('status').style.color = '#4ecdc4';
        };

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            document.getElementById('temp').textContent = data.temperature;
            document.getElementById('pressure').textContent = data.pressure;
            document.getElementById('humidity').textContent = data.humidity;
            
            chart.data.labels.push(data.timestamp);
            chart.data.datasets[0].data.push(data.temperature);
            chart.data.datasets[1].data.push(data.pressure);
            
            if (chart.data.labels.length > 50) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
            }
            chart.update('none');
        };

        eventSource.onerror = () => {
            document.getElementById('status').innerHTML = '🔴 Disconnected';
            document.getElementById('status').style.color = '#ff6b6b';
        };
    </script>
</body>
</html>
