{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="layout-page">
  <div class="content-wrapper">
    <div class="container-xxl flex-grow-1 container-p-y">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Add Classroom</h4>
        <a href="{% url 'classes' %}" class="btn btn-outline-secondary btn-sm"><i class="bx bx-left-arrow-alt"></i> Back</a>
      </div>

      {% if errors %}
      <div class="alert alert-danger">
        <ul class="mb-0">
          {% for err in errors %}
          <li>{{ err }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}

      <div class="card mb-4">
        <div class="card-body">
          <form method="POST" novalidate>
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-6">
                <label for="name" class="form-label">Classroom Name</label>
                <input id="name" name="name" class="form-control" type="text" value="{{ form.name }}" placeholder="e.g., D1" required />
              </div>

              <div class="col-md-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="occupied" name="occupied" {% if form.occupied %}checked{% endif %}>
                  <label class="form-check-label" for="occupied">Occupied</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="lights_on" name="lights_on" {% if form.lights_on %}checked{% endif %}>
                  <label class="form-check-label" for="lights_on">Lights On</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="projector_on" name="projector_on" {% if form.projector_on %}checked{% endif %}>
                  <label class="form-check-label" for="projector_on">Projector On</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="door" name="door" {% if form.door %}checked{% endif %}>
                  <label class="form-check-label" for="door">Door Open</label>
                </div>
              </div>

              <div class="col-md-12">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="danger_indicator" name="danger_indicator" {% if form.danger_indicator %}checked{% endif %}>
                  <label class="form-check-label" for="danger_indicator">Danger Indicator</label>
                </div>
              </div>

              <div class="col-md-12 text-end">
                <button type="submit" class="btn btn-primary">Save Classroom</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
