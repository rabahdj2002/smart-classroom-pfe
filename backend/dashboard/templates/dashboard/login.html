{% load static %}
<!DOCTYPE html>
<html
  lang="en"
  class="light-style customizer-hide"
  dir="ltr"
  data-theme="theme-default"
  data-assets-path="../assets/"
  data-template="vertical-menu-template-free"
>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />

    <title>Admin Login | Smart Classroom</title>

    <link rel="icon" type="image/x-icon" href="{% static 'dashboard/img/favicon/favicon.ico' %}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'dashboard/vendor/fonts/boxicons.css' %}" />
    <link rel="stylesheet" href="{% static 'dashboard/vendor/css/core.css' %}" class="template-customizer-core-css" />
    <link rel="stylesheet" href="{% static 'dashboard/vendor/css/theme-default.css' %}" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="{% static 'dashboard/css/demo.css' %}" />

    <link rel="stylesheet" href="{% static 'dashboard/vendor/libs/perfect-scrollbar/perfect-scrollbar.css' %}" />

    <script src="{% static 'dashboard/vendor/js/helpers.js' %}"></script>
    <script src="{% static 'dashboard/js/config.js' %}"></script>
  </head>

  <body>
    <div class="container-xxl">
      <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner">
          <div class="card">
            <div class="card-body">
              <div class="app-brand justify-content-center mb-3">
                <span class="app-brand-text demo text-body fw-bolder">Smart Classroom</span>
              </div>

              <h4 class="mb-2">Admin Portal Login</h4>
              <p class="mb-4">Only admin portal accounts are allowed to sign in.</p>

              {% if error %}
              <div class="alert alert-danger" role="alert">{{ error }}</div>
              {% endif %}

              {% if messages %}
                {% for message in messages %}
                <div class="alert alert-warning" role="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}

              <form method="POST" class="mb-3">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}" />
                <div class="mb-3">
                  <label for="username" class="form-label">Username</label>
                  <input type="text" class="form-control" id="username" name="username" required autofocus />
                </div>
                <div class="mb-3 form-password-toggle">
                  <label class="form-label" for="password">Password</label>
                  <div class="input-group input-group-merge">
                    <input type="password" id="password" class="form-control" name="password" required />
                  </div>
                </div>
                <div class="mb-3">
                  <button class="btn btn-primary d-grid w-100" type="submit">Sign in</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{% static 'dashboard/vendor/libs/jquery/jquery.js' %}"></script>
    <script src="{% static 'dashboard/vendor/libs/popper/popper.js' %}"></script>
    <script src="{% static 'dashboard/vendor/js/bootstrap.js' %}"></script>
    <script src="{% static 'dashboard/vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
    <script src="{% static 'dashboard/vendor/js/menu.js' %}"></script>
    <script src="{% static 'dashboard/js/main.js' %}"></script>
  </body>
</html>
